{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% trans "Dashboard Access" %}</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f8fc;
      font-family: Arial, sans-serif;
      color: #111827;
    }
    .card {
      width: min(92vw, 420px);
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 28px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.5rem;
    }
    p {
      color: #6b7280;
      margin: 0 0 18px;
    }
    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 1rem;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 {% trans "Dashboard Access" %}</h1>
    <p>{% trans "Enter the password to continue." %}</p>

    {% if messages %}
      {% for message in messages %}
        <div class="error">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="password">{% trans "Password" %}</label>
        <input id="password" name="password" type="password" required autofocus>
      </div>
      <button type="submit">{% trans "Continue" %}</button>
    </form>
  </div>
</body>
</html>
